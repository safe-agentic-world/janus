stages:
  - nomos-smoke

nomos_ci_smoke:
  stage: nomos-smoke
  image: golang:1.25
  variables:
    GOFLAGS: "-mod=readonly"
  script:
    - mkdir -p bin artifacts/nomos-ci-smoke
    - go build -o ./bin/nomos ./cmd/nomos
    - ./bin/nomos doctor -c ./examples/ci/github/config.ci.json --format json > artifacts/nomos-ci-smoke/doctor.json
    - ./bin/nomos policy test --bundle ./profiles/ci-strict.yaml --action ./examples/ci/github/actions/allow-git-status.json > artifacts/nomos-ci-smoke/allow-git-status.json
    - ./bin/nomos policy test --bundle ./profiles/ci-strict.yaml --action ./examples/ci/github/actions/deny-git-push.json > artifacts/nomos-ci-smoke/deny-git-push.json
    - ./bin/nomos policy test --bundle ./profiles/ci-strict.yaml --action ./examples/ci/github/actions/deny-secret-read.json > artifacts/nomos-ci-smoke/deny-secret-read.json
    - ./bin/nomos run codex --profile ci-strict --no-launch --print-config > artifacts/nomos-ci-smoke/codex-launcher.txt
    - ./bin/nomos run claude --profile ci-strict --no-launch --print-config > artifacts/nomos-ci-smoke/claude-launcher.txt
    - grep -q "Profile:       ci-strict" artifacts/nomos-ci-smoke/codex-launcher.txt
    - grep -q "MCP wiring:" artifacts/nomos-ci-smoke/codex-launcher.txt
    - grep -q "Native client approvals are not Nomos approvals" artifacts/nomos-ci-smoke/codex-launcher.txt
    - grep -q "Profile:       ci-strict" artifacts/nomos-ci-smoke/claude-launcher.txt
    - grep -q "MCP wiring:" artifacts/nomos-ci-smoke/claude-launcher.txt
    - grep -q "Native client approvals are not Nomos approvals" artifacts/nomos-ci-smoke/claude-launcher.txt
    - ./bin/nomos job run --agent codex --profile ci-strict --task ./examples/ci/tasks/noop.md --dry-run --artifact-dir artifacts/nomos-ci-smoke/job-codex-dry-run
    - ./bin/nomos job run --agent claude --profile ci-strict --task ./examples/ci/tasks/noop.md --dry-run --artifact-dir artifacts/nomos-ci-smoke/job-claude-dry-run
    - grep -q '"agent": "codex"' artifacts/nomos-ci-smoke/job-codex-dry-run/job-metadata.json
    - grep -q '"exit_reason": "dry_run"' artifacts/nomos-ci-smoke/job-codex-dry-run/job-metadata.json
    - grep -q '"agent": "claude"' artifacts/nomos-ci-smoke/job-claude-dry-run/job-metadata.json
    - grep -q '"exit_reason": "dry_run"' artifacts/nomos-ci-smoke/job-claude-dry-run/job-metadata.json
    - go test ./internal/mcp -run TestNormalizeExecParamsUnwrapsPowerShellCommand -count=1
  artifacts:
    when: always
    paths:
      - artifacts/nomos-ci-smoke/
    expire_in: 7 days
