name: nomos-strong-guarantee-reference

on:
  workflow_dispatch:

jobs:
  nomos-reference:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      NOMOS_RUNTIME_STRONG_GUARANTEE: "true"
      NOMOS_RUNTIME_DEPLOYMENT_MODE: "ci"
      NOMOS_MCP_ENABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"

      - name: Build Nomos
        run: |
          go build -o ./bin/nomos ./cmd/nomos

      - name: Strong-guarantee preflight
        run: |
          mkdir -p ./.tmp/strong
          cat > ./.tmp/strong/bundle.json <<'EOF'
          {"version":"v1","rules":[{"id":"allow-readme","action_type":"fs.read","resource":"file://workspace/README.md","decision":"ALLOW","principals":["system"],"agents":["nomos"],"environments":["prod"]}]}
          EOF
          cat > ./.tmp/strong/oidc.pub.pem <<'EOF'
          -----BEGIN PUBLIC KEY-----
          placeholder
          -----END PUBLIC KEY-----
          EOF
          printf "placeholder" > ./.tmp/strong/tls.crt
          printf "placeholder" > ./.tmp/strong/tls.key
          printf "placeholder" > ./.tmp/strong/client-ca.pem
          cat > ./.tmp/strong/config.json <<'EOF'
          {
            "gateway": {
              "listen": ":8080",
              "transport": "http",
              "tls": {
                "enabled": true,
                "cert_file": "tls.crt",
                "key_file": "tls.key",
                "client_ca_file": "client-ca.pem",
                "require_mtls": true
              }
            },
            "runtime": {
              "stateless_mode": false,
              "strong_guarantee": true,
              "deployment_mode": "ci",
              "evidence": {
                "container_backend_ready": true,
                "rootless_or_non_privileged": true,
                "read_only_fs": true,
                "no_new_privileges": true,
                "network_default_deny": true,
                "workload_identity_verified": true,
                "durable_audit_verified": true
              }
            },
            "policy": {
              "policy_bundle_path": "bundle.json"
            },
            "executor": {
              "sandbox_enabled": true,
              "sandbox_profile": "container",
              "workspace_root": "../.."
            },
            "audit": {
              "sink": "sqlite:./audit.db"
            },
            "mcp": {
              "enabled": true
            },
            "approvals": {
              "enabled": false
            },
            "identity": {
              "principal": "system",
              "agent": "nomos",
              "environment": "prod",
              "api_keys": {},
              "agent_secrets": {
                "nomos": "placeholder-agent-secret"
              },
              "oidc": {
                "enabled": true,
                "issuer": "https://issuer.example",
                "audience": "nomos",
                "public_key_path": "oidc.pub.pem"
              }
            }
          }
          EOF
          ./bin/nomos doctor -c ./.tmp/strong/config.json --format json
