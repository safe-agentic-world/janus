image:
  repository: ghcr.io/safe-agentic-world/nomos
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

audit:
  sink: stdout

config:
  useStarterBundle: true
  policyBundlePath: ""

identity:
  useDemoCredentials: true
  principal: system
  agent: nomos
  environment: dev
  apiKey: dev-api-key
  agentSecret: dev-agent-secret
  oidc:
    enabled: false
    issuer: ""
    audience: ""
    publicKeyPath: ""

serviceAccount:
  create: true
  name: ""
