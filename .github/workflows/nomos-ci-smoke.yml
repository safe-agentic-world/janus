name: Nomos CI Boundary Smoke

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nomos-ci-smoke:
    name: CI Boundary Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: actions/setup-go@v6.3.0
        with:
          go-version: "1.25.10"
          cache: true

      - name: Build nomos
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p bin artifacts/nomos-ci-smoke
          go build -o ./bin/nomos ./cmd/nomos

      - name: Doctor CI posture
        shell: bash
        run: |
          set -euo pipefail
          ./bin/nomos doctor -c ./examples/ci/github/config.ci.json --format json > artifacts/nomos-ci-smoke/doctor.json
          cat artifacts/nomos-ci-smoke/doctor.json
          python3 - <<'PY'
          import json
          import pathlib

          payload = json.loads(pathlib.Path("artifacts/nomos-ci-smoke/doctor.json").read_text())
          assert payload["overall_status"] == "READY", payload
          assert payload["assurance_level"] in {"GUARDED", "BEST_EFFORT"}, payload
          assert payload["policy_bundle_hash"], payload
          PY

      - name: Policy decision fixtures
        shell: bash
        run: |
          set -euo pipefail

          ./bin/nomos policy test --bundle ./profiles/ci-strict.yaml --action ./examples/ci/github/actions/allow-git-status.json > artifacts/nomos-ci-smoke/allow-git-status.json
          ./bin/nomos policy test --bundle ./profiles/ci-strict.yaml --action ./examples/ci/github/actions/deny-git-push.json > artifacts/nomos-ci-smoke/deny-git-push.json
          ./bin/nomos policy test --bundle ./profiles/ci-strict.yaml --action ./examples/ci/github/actions/deny-secret-read.json > artifacts/nomos-ci-smoke/deny-secret-read.json

          python3 - <<'PY'
          import json
          import pathlib

          expected = {
              "allow-git-status.json": "ALLOW",
              "deny-git-push.json": "DENY",
              "deny-secret-read.json": "DENY",
          }
          root = pathlib.Path("artifacts/nomos-ci-smoke")
          for name, decision in expected.items():
              payload = json.loads((root / name).read_text())
              assert payload["decision"] == decision, payload
              assert payload["policy_bundle_hash"], payload
          PY

      - name: Agent launcher preflight
        shell: bash
        run: |
          set -euo pipefail

          ./bin/nomos run codex --profile ci-strict --no-launch --print-config > artifacts/nomos-ci-smoke/codex-launcher.txt
          ./bin/nomos run claude --profile ci-strict --no-launch --print-config > artifacts/nomos-ci-smoke/claude-launcher.txt

          python3 - <<'PY'
          import pathlib

          required = [
              "Profile:       ci-strict",
              "Assurance:",
              "Approvals:",
              "MCP wiring:",
              "run_command    -> process.exec",
              "http_request   -> net.http_request",
              "Native client approvals are not Nomos approvals",
              "\"mcpServers\"",
              "\"nomos\"",
              "\"--tool-surface\"",
              "\"friendly\"",
              "\"--quiet\"",
          ]
          for name in ["codex-launcher.txt", "claude-launcher.txt"]:
              text = pathlib.Path("artifacts/nomos-ci-smoke", name).read_text()
              for needle in required:
                  assert needle in text, f"{name} missing {needle!r}"
          PY

      - name: Governed job runner dry-run
        shell: bash
        run: |
          set -euo pipefail

          ./bin/nomos job run \
            --agent codex \
            --profile ci-strict \
            --task ./examples/ci/tasks/noop.md \
            --dry-run \
            --artifact-dir artifacts/nomos-ci-smoke/job-codex-dry-run

          ./bin/nomos job run \
            --agent claude \
            --profile ci-strict \
            --task ./examples/ci/tasks/noop.md \
            --dry-run \
            --artifact-dir artifacts/nomos-ci-smoke/job-claude-dry-run

          python3 - <<'PY'
          import json
          import pathlib

          for name, agent in [("job-codex-dry-run", "codex"), ("job-claude-dry-run", "claude")]:
              root = pathlib.Path("artifacts/nomos-ci-smoke", name)
              metadata = json.loads((root / "job-metadata.json").read_text())
              assert metadata["agent"] == agent, metadata
              assert metadata["profile"] == "ci-strict", metadata
              assert metadata["exit_reason"] == "dry_run", metadata
              assert metadata["policy_bundle_hash"], metadata
              assert metadata["assurance_level"], metadata
              assert metadata["mcp_wiring_method"] == "skipped", metadata
              assert (root / "mcp-config.json").exists(), metadata
              assert (root / "audit.jsonl").exists(), metadata
              assert (root / "changed-files.json").exists(), metadata
              assert (root / "policy-summary.json").exists(), metadata
          PY

      - name: MCP process smoke
        run: go test ./internal/mcp -run TestNormalizeExecParamsUnwrapsPowerShellCommand -count=1

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: nomos-ci-smoke
          path: artifacts/nomos-ci-smoke/
          if-no-files-found: error
